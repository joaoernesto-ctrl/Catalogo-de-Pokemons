<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex - Catalogo de Pokemons</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navTags">
            <img src="img/pokeapi.webp" alt="PokeDex Logo">
            <ul class="navTagsList">
                <li class="nav-item"><button class="btn-header" id="ver-todos">Todos</button></li> 
                <li class="nav-item"><button class="btn-header" id="normal">Normal</button></li>
                <li class="nav-item"><button class="btn-header" id="fire">Fire</button></li>
                <li class="nav-item"><button class="btn-header" id="water">Water</button></li>
                <li class="nav-item"><button class="btn-header" id="grass">Grass</button></li>
                <li class="nav-item"><button class="btn-header" id="electric">Electric</button></li>
                <li class="nav-item"><button class="btn-header" id="ice">Ice</button></li>
                <li class="nav-item"><button class="btn-header" id="fighting">Fighting</button></li>
                <li class="nav-item"><button class="btn-header" id="poison">Poison</button></li>
                <li class="nav-item"><button class="btn-header" id="ground">Ground</button></li>
                <li class="nav-item"><button class="btn-header" id="flying">Flying</button></li>
                <li class="nav-item"><button class="btn-header" id="psychic">Psychic</button></li>
                <li class="nav-item"><button class="btn-header" id="bug">Bug</button></li>
                <li class="nav-item"><button class="btn-header" id="rock">Rock</button></li>
                <li class="nav-item"><button class="btn-header" id="ghost">Ghost</button></li>
                <li class="nav-item"><button class="btn-header" id="dark">Dark</button></li>
                <li class="nav-item"><button class="btn-header" id="dragon">Dragon</button></li>
                <li class="nav-item"><button class="btn-header" id="steel">Steel</button></li>
                <li class="nav-item"><button class="btn-header" id="fairy">Fairy</button></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="pokemonCards">
            <div class="gridContainer" id="pokemonList">
                
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
